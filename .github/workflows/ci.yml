name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race

      - name: go build
        run: go build ./...
