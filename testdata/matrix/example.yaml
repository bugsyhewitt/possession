# Example possession role-matrix. Fully commented reference document.
#
# version: schema version. Currently must be "1".
version: "1"

# target: coarse description of the system under test.
target:
  base_url: "https://api.example.com"

# identities: who we will replay each baseline request as. Order matters
# only for stable output; uniqueness is on `name`.
identities:
  # The unauthenticated case. Used for authn-bypass tests.
  - name: anon
    role: unauthenticated
    rank: 0

  # A standard end user — authenticates via cookie + API key header.
  # markers (D20): strings unique to alice's account data. When a variant
  # body sent as a different identity contains any of these, the detector
  # treats it as a near-certain IDOR.
  - name: alice
    role: standard-user
    rank: 10
    creds:
      cookies:
        session: "s%3Aalice-session-abc123"
      headers:
        X-Api-Key: "alice-key-xyz"
    markers:
      - "alice@example.com"
      - "Alice Liddell"
    # resources (POST_V01 Item 1): object IDs alice legitimately owns. The
    # swap-object mutator substitutes a peer identity's matching value into
    # alice's own authenticated request (path/query/JSON body) — the canonical
    # horizontal-IDOR / BOLA test. Fires only when both identities define
    # resources sharing a key.
    resources:
      user_id: "1001"
      order_id: "5523"

  # A peer of alice — used to test horizontal access (IDOR).
  - name: bob
    role: standard-user
    rank: 10
    creds:
      bearer: "eyJhbGciOiJIUzI1NiI...bob-token"
    markers:
      - "bob@example.com"
      - "Bob Roberts"
    resources:
      user_id: "2002"
      order_id: "6634"

  # The admin — used to test vertical access (privesc).
  - name: admin
    role: administrator
    rank: 100
    creds:
      basic:
        username: admin
        password: "hunter2"
    markers:
      - "admin@example.com"
    # Tier-1 refresh: P2 will issue this request and inject the extracted
    # value into every subsequent admin replay.
    refresh:
      request:
        method: GET
        url: "https://api.example.com/account"
      extract:
        - name: csrf
          from: body-json
          expr: "$.csrfToken"
          inject:
            into: header
            key: X-CSRF-Token

# scope: glob filters applied to the path of every captured request.
scope:
  include:
    - "/api/**"
  exclude:
    - "/api/health"
    - "**/*.js"

# settings: replay engine controls (P2+).
settings:
  rate_per_host: 10
  concurrency: 5
  timeout: 15s
  follow_redirects: false
