# Example role matrix for the bundled `capture.har` ecommerce capture.
# Three identities (alice, bob, admin) + anon, each with a bearer token
# the demo httptest server in cmd/possession-demo recognizes.

version: "1"

target:
  base_url: "https://shop.example.test"

identities:
  - name: anon
    role: unauthenticated
    rank: 0

  - name: alice
    role: customer
    rank: 10
    creds:
      bearer: "alice-bearer-token"
    markers:
      - "alice@example.com"
      - "Alice Liddell"
    # Object references alice legitimately owns. The swap-object mutator
    # substitutes another identity's matching value into alice's own
    # authenticated request — the canonical horizontal-IDOR / BOLA test.
    resources:
      order_id: "12345"

  - name: bob
    role: customer
    rank: 10
    creds:
      bearer: "bob-bearer-token"
    markers:
      - "bob@example.com"
      - "Bob Roberts"
    resources:
      order_id: "67890"

  - name: admin
    role: administrator
    rank: 100
    creds:
      bearer: "admin-bearer-token"
    markers:
      - "admin@example.com"

scope:
  include:
    - "/api/**"

settings:
  rate_per_host: 50
  concurrency: 5
  timeout: 10s
